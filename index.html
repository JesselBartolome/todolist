<!DOCTYPE html>
<html lang="en">
    <head>
    </head>
    <body>
    <div id="app"> 
        <aside  id="category sidebar" class="category sidebar">
            <h2>Categories</h2>
            <form id="category-forms" class="category-forms">
                <input type="text" id="category-input" class="category-input" placeholder="New Category">
                <button class="add-category" type="submit">Add</button>
            </form>
            <h2>CATEGORY LIST</h2>
            <ul id="category list" class="category list"></ul>
        </aside>
        <main>
            <h1>Advanced Todo List</h1>
            <form id="task-form" class="task-form">
            <div class="task-name">
            <div class="form-group">
                <label form="task-input">Task</label>
                <input type="text" id="task-input" placeholder="New Task">
            </div>
            </div>
            <div class="form-group">
                <label for="category-select">Categories:</label>
                <select id="category-select" class="category-select" multiple>
                    <!--Categories will be dynamically added here-->
                </select>
            </div>
            <button type="submit">Add Task</button>
            </form>
            <h2 class="task-label">Task List</h2>
            <div id="task-List">
            </div>
        </main>
        <aside id="analytics-sidebar">
            <h2>Analytics</h2>
            <div id="category-stats"></div>
        </aside>
    </div>
    </body>
</html>
